# Minimal SkillOpt config for optimizing dispatcher-routing instructions.
# It uses SkillOpt's SearchQA environment as a small exact-match benchmark:
# each item asks which plugin route(s) should be selected for a task.

env: searchqa
skill_init: plugins/codex-augment-dispatcher/skills/dispatch/SKILL.md
split_mode: split_dir
split_dir: tools/skillopt/data/dispatch-routing
out_root: .tmp/skillopt-runs/dispatch-routing

model_backend: codex
optimizer_backend: codex_exec
target_backend: codex_exec
optimizer_model: ""
target_model: ""
reasoning_effort: medium
rewrite_reasoning_effort: high
rewrite_max_completion_tokens: 32000
codex_exec_path: codex
codex_exec_sandbox: read-only
codex_exec_profile: ""
codex_exec_full_auto: false
codex_exec_reasoning_effort: medium
codex_exec_use_sdk: cli
codex_exec_network_access: false
codex_exec_web_search: false
codex_exec_approval_policy: never

num_epochs: 1
train_size: 4
batch_size: 2
accumulation: 1
seed: 42

edit_budget: 2
min_edit_budget: 1
lr_scheduler: constant
lr_control_mode: fixed
skill_update_mode: patch
use_slow_update: false
use_meta_skill: false
longitudinal_pair_policy: mixed

minibatch_size: 2
merge_batch_size: 2
analyst_workers: 2
max_analyst_rounds: 2
failure_only: false

use_gate: true
gate_metric: hard
sel_env_num: 2
test_env_num: 2
eval_test: true

max_turns: 1
workers: 2
limit: 0
max_completion_tokens: 4096
max_api_workers: 2
